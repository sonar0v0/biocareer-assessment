<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生物医药职业决策测评 | BioCareer Compass Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#0ea5e9;--primary-dark:#0284c7;--primary-light:#38bdf8;--secondary:#10b981;--accent:#f59e0b;--danger:#ef4444;--bg:#f8fafc;--card:#fff;--text:#0f172a;--text-secondary:#475569;--text-light:#94a3b8;--border:#e2e8f0;--shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);--shadow-xl:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);--gradient-primary:linear-gradient(135deg,#0ea5e9,#0284c7);--gradient-secondary:linear-gradient(135deg,#10b981,#059669);--gradient-accent:linear-gradient(135deg,#f59e0b,#d97706);--gradient-bg:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 50%,#f0fdfa)}
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--gradient-bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
        .bg-animation{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden}
        .bg-animation::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 20% 80%,rgba(14,165,233,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(16,185,129,.08) 0%,transparent 50%),radial-gradient(circle at 40% 40%,rgba(245,158,11,.05) 0%,transparent 40%);animation:bgFloat 20s ease-in-out infinite}
        @keyframes bgFloat{0%,100%{transform:translate(0,0) rotate(0)}33%{transform:translate(30px,-30px) rotate(1deg)}66%{transform:translate(-20px,20px) rotate(-1deg)}}
        .container{max-width:900px;margin:0 auto;padding:20px;position:relative;z-index:1}
        .header{text-align:center;padding:50px 30px;background:var(--gradient-primary);color:#fff;border-radius:24px;margin-bottom:30px;box-shadow:var(--shadow-xl);position:relative;overflow:hidden}
        .header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.1) 0%,transparent 50%),radial-gradient(circle at 80% 50%,rgba(255,255,255,.1) 0%,transparent 50%);animation:headerShine 8s ease-in-out infinite}
        @keyframes headerShine{0%,100%{opacity:.5}50%{opacity:1}}
        .header-content{position:relative;z-index:1}
        .header-icon{font-size:3.5rem;margin-bottom:15px;animation:float 3s ease-in-out infinite;display:inline-block}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .header h1{font-size:2.2rem;font-weight:700;margin-bottom:12px;text-shadow:0 2px 4px rgba(0,0,0,.1)}
        .header p{font-size:1.1rem;opacity:.95;max-width:600px;margin:0 auto;font-weight:300}
        .header-badges{display:flex;justify-content:center;gap:15px;margin-top:20px;flex-wrap:wrap}
        .header-badge{background:rgba(255,255,255,.2);padding:8px 16px;border-radius:20px;font-size:.85rem;backdrop-filter:blur(10px);display:flex;align-items:center;gap:6px}
        .progress-container{background:var(--card);padding:25px;border-radius:20px;margin-bottom:25px;box-shadow:var(--shadow);border:1px solid var(--border)}
        .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .progress-title{font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
        .progress-percentage{font-size:1.5rem;font-weight:700;color:var(--primary)}
        .progress-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;position:relative}
        .progress-fill{height:100%;background:var(--gradient-primary);border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative}
        .progress-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:progressShine 2s infinite}
        @keyframes progressShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
        .progress-steps{display:flex;justify-content:space-between;margin-top:12px;padding:0 5px}
        .progress-step{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s ease}
        .progress-step.active{background:var(--primary);transform:scale(1.3);box-shadow:0 0 0 3px rgba(14,165,233,.2)}
        .progress-step.completed{background:var(--secondary)}
        .welcome-screen{background:var(--card);padding:45px;border-radius:24px;box-shadow:var(--shadow-lg);border:1px solid var(--border);text-align:center;animation:fadeInUp .6s ease}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .welcome-badge{display:inline-block;background:var(--gradient-primary);color:#fff;padding:8px 20px;border-radius:20px;font-size:.9rem;font-weight:500;margin-bottom:25px}
        .welcome-screen h2{font-size:1.8rem;margin-bottom:15px;color:var(--text);font-weight:700}
        .welcome-screen .subtitle{color:var(--text-secondary);font-size:1.1rem;margin-bottom:35px;line-height:1.8}
        .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:35px 0}
        @media(max-width:768px){.feature-grid{grid-template-columns:1fr}}
        .feature-card{padding:25px 20px;background:linear-gradient(135deg,#f8fafc,#f1f5f9);border-radius:16px;border:2px solid transparent;transition:all .3s ease;cursor:pointer}
        .feature-card:hover{border-color:var(--primary-light);transform:translateY(-5px);box-shadow:var(--shadow-lg);background:#fff}
        .feature-icon{width:60px;height:60px;background:var(--gradient-primary);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 15px;color:#fff;box-shadow:0 4px 15px rgba(14,165,233,.3)}
        .feature-card:nth-child(2) .feature-icon{background:var(--gradient-secondary);box-shadow:0 4px 15px rgba(16,185,129,.3)}
        .feature-card:nth-child(3) .feature-icon{background:var(--gradient-accent);box-shadow:0 4px 15px rgba(245,158,11,.3)}
        .feature-card h3{font-size:1.1rem;margin-bottom:10px;color:var(--text);font-weight:600}
        .feature-card p{font-size:.9rem;color:var(--text-secondary);margin:0;line-height:1.6}
        .stats-bar{display:flex;justify-content:center;gap:40px;margin:30px 0;padding:20px;background:var(--bg);border-radius:12px}
        .stat-item{text-align:center}
        .stat-number{font-size:2rem;font-weight:700;color:var(--primary);display:block}
        .stat-label{font-size:.85rem;color:var(--text-light);margin-top:5px}
        .btn{padding:16px 32px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s ease;display:inline-flex;align-items:center;justify-content:center;gap:10px}
        .btn-primary{background:var(--gradient-primary);color:#fff;box-shadow:0 4px 15px rgba(14,165,233,.4)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(14,165,233,.5)}
        .btn-primary:active{transform:translateY(0)}
        .btn-secondary{background:#fff;color:var(--text);border:2px solid var(--border)}
        .btn-secondary:hover{border-color:var(--primary);color:var(--primary);background:#f0f9ff}
        .btn-large{padding:18px 40px;font-size:1.1rem;border-radius:14px}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
        .question-card{background:var(--card);padding:35px;border-radius:24px;box-shadow:var(--shadow-lg);border:1px solid var(--border);margin-bottom:20px;display:none;animation:fadeInUp .5s ease}
        .question-card.active{display:block}
        .question-header{display:flex;align-items:center;gap:15px;margin-bottom:25px}
        .question-number{background:var(--gradient-primary);color:#fff;padding:10px 18px;border-radius:12px;font-size:.9rem;font-weight:600}
        .dimension-tag{background:#f0f9ff;color:var(--primary);padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:500}
        .question-text{font-size:1.25rem;font-weight:600;margin-bottom:20px;line-height:1.7;color:var(--text)}
        .scenario-box{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-left:4px solid var(--primary);padding:25px;border-radius:16px;margin-bottom:30px;position:relative}
        .scenario-box::before{content:'💭';position:absolute;top:-10px;left:20px;background:#fff;padding:5px 10px;border-radius:20px;font-size:1.2rem;box-shadow:0 1px 2px rgba(0,0,0,.05)}
        .scenario-box p{color:var(--text-secondary);font-style:italic;line-height:1.8;margin-top:10px}
        .options-container{display:flex;flex-direction:column;gap:14px}
        .option-btn{padding:20px 24px;background:var(--bg);border:2px solid var(--border);border-radius:16px;cursor:pointer;text-align:left;font-size:1rem;color:var(--text);transition:all .25s ease;display:flex;align-items:flex-start;gap:15px}
        .option-btn:hover{border-color:var(--primary-light);background:#f0f9ff;transform:translateX(8px);box-shadow:var(--shadow)}
        .option-btn.selected{border-color:var(--primary);background:linear-gradient(135deg,#eff6ff,#dbeafe);box-shadow:0 0 0 4px rgba(14,165,233,.15)}
        .option-letter{width:36px;height:36px;background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;transition:all .2s ease}
        .option-btn:hover .option-letter{background:var(--primary-light);color:#fff}
        .option-btn.selected .option-letter{background:var(--primary);color:#fff;transform:scale(1.1)}
        .option-text{flex:1;line-height:1.6;padding-top:5px}
        .nav-buttons{display:flex;gap:15px;margin-top:30px}
        .nav-buttons .btn{flex:1}
        .loading-screen{display:none;text-align:center;padding:80px 40px;background:var(--card);border-radius:24px;box-shadow:var(--shadow-lg)}
        .loading-screen.active{display:block;animation:fadeIn .5s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .loading-animation{position:relative;width:120px;height:120px;margin:0 auto 30px}
        .loading-ring{position:absolute;border:4px solid transparent;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
        .loading-ring:nth-child(1){width:120px;height:120px;top:0;left:0;animation-duration:1.5s}
        .loading-ring:nth-child(2){width:90px;height:90px;top:15px;left:15px;border-top-color:var(--secondary);animation-duration:1.2s;animation-direction:reverse}
        .loading-ring:nth-child(3){width:60px;height:60px;top:30px;left:30px;border-top-color:var(--accent);animation-duration:.9s}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{font-size:1.3rem;color:var(--text);font-weight:600;margin-bottom:10px}
        .loading-subtext{color:var(--text-light);font-size:.95rem}
        .loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
        @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:''}}
        .results-screen{display:none;animation:fadeInUp .6s ease}
        .results-screen.active{display:block}
        .result-hero{background:var(--card);padding:50px 40px;border-radius:24px;box-shadow:var(--shadow-lg);border:1px solid var(--border);text-align:center;margin-bottom:25px;position:relative;overflow:hidden}
        .result-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--gradient-primary)}
        .result-badge{display:inline-block;background:var(--gradient-primary);color:#fff;padding:15px 35px;border-radius:30px;font-size:2rem;font-weight:700;margin-bottom:25px;box-shadow:0 10px 30px rgba(14,165,233,.3);letter-spacing:3px}
        .result-title{font-size:1.6rem;color:var(--text);margin-bottom:20px;font-weight:700}
        .result-description{color:var(--text-secondary);max-width:650px;margin:0 auto;line-height:1.9;font-size:1.05rem}
        .dimensions-section,.careers-section,.action-section{background:var(--card);padding:35px;border-radius:24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:25px}
        .section-header{display:flex;align-items:center;gap:12px;margin-bottom:30px}
        .section-icon{width:45px;height:45px;background:var(--gradient-primary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem}
        .section-title{font-size:1.3rem;font-weight:700;color:var(--text)}
        .dimension-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
        @media(max-width:600px){.dimension-cards{grid-template-columns:1fr}}
        .dimension-card{background:var(--bg);padding:25px;border-radius:16px;border:2px solid transparent;transition:all .3s ease}
        .dimension-card:hover{border-color:var(--border);transform:translateY(-3px);box-shadow:var(--shadow)}
        .dimension-card.primary{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:var(--primary)}
        .dimension-card.secondary{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:var(--secondary)}
        .dimension-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .dimension-name{font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
        .dimension-code{background:#fff;padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:700;color:var(--primary)}
        .dimension-score{font-size:1.5rem;font-weight:700;color:var(--primary)}
        .dimension-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:10px}
        .dimension-fill{height:100%;border-radius:5px;transition:width 1s cubic-bezier(.4,0,.2,1)}
        .dimension-fill.high{background:var(--gradient-secondary)}
        .dimension-fill.medium{background:var(--gradient-accent)}
        .dimension-fill.low{background:linear-gradient(90deg,var(--text-light),#cbd5e1)}
        .dimension-desc{font-size:.9rem;color:var(--text-secondary);line-height:1.6}
        .career-cards{display:flex;flex-direction:column;gap:20px}
        .career-card{background:var(--bg);border-radius:20px;padding:30px;border:2px solid transparent;transition:all .3s ease;position:relative;overflow:hidden}
        .career-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;background:var(--gradient-primary);opacity:0;transition:opacity .3s ease}
        .career-card:hover{border-color:var(--primary-light);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
        .career-card:hover::before{opacity:1}
        .career-card.best-match{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:var(--primary)}
        .career-card.best-match::before{opacity:1}
        .career-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
        .career-match-badge{background:var(--gradient-secondary);color:#fff;padding:8px 16px;border-radius:20px;font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:6px}
        .career-match-badge.medium{background:var(--gradient-accent)}
        .career-rank{width:36px;height:36px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem}
        .career-name{font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:12px}
        .career-tags{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
        .career-tag{background:#fff;padding:6px 14px;border-radius:20px;font-size:.85rem;color:var(--text-secondary);border:1px solid var(--border)}
        .career-description{color:var(--text-secondary);line-height:1.8;font-size:.95rem}
        .career-details{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
        @media(max-width:600px){.career-details{grid-template-columns:1fr}}
        .career-detail{text-align:center}
        .career-detail-value{font-size:1.1rem;font-weight:700;color:var(--primary);display:block}
        .career-detail-label{font-size:.8rem;color:var(--text-light);margin-top:4px}
        .action-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
        @media(max-width:600px){.action-buttons{grid-template-columns:1fr}}
        .action-btn{padding:18px 24px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .3s ease;display:flex;flex-direction:column;align-items:center;gap:10px}
        .action-btn:hover{border-color:var(--primary);background:#f0f9ff;transform:translateY(-3px);box-shadow:var(--shadow)}
        .action-btn i{font-size:1.5rem;color:var(--primary)}
        .action-btn span{font-weight:600;color:var(--text)}
        @media(max-width:768px){.header{padding:35px 20px}.header h1{font-size:1.6rem}.welcome-screen,.question-card,.results-screen>div{padding:25px}.question-text{font-size:1.1rem}.option-btn{padding:16px 18px}.result-badge{font-size:1.5rem;padding:12px 25px}.result-title{font-size:1.3rem}}
        @media print{.bg-animation,.header,.progress-container,.action-section{display:none!important}.results-screen{display:block!important}.results-screen>div{box-shadow:none;border:1px solid #ddd;break-inside:avoid}}
        .confetti{position:fixed;width:10px;height:10px;top:-10px;animation:confetti-fall 3s ease-out forwards;z-index:9999}
        @keyframes confetti-fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:16px 32px;border-radius:12px;font-weight:500;box-shadow:var(--shadow-xl);z-index:10000;opacity:0;transition:all .3s ease}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        .save-status{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text-light);margin-top:15px}
        .save-status.saved{color:var(--secondary)}
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="header"><div class="header-content">
            <div class="header-icon">🧬</div>
            <h1>生物医药职业决策测评</h1>
            <p>基于科学的职业兴趣评估，帮助你发现最适合的生物医药职业方向</p>
            <div class="header-badges">
                <span class="header-badge"><i class="fas fa-flask"></i> 科学严谨</span>
                <span class="header-badge"><i class="fas fa-chart-line"></i> 6维评估</span>
                <span class="header-badge"><i class="fas fa-bullseye"></i> 精准匹配</span>
            </div>
        </div></div>
        <div class="progress-container" id="progressContainer" style="display:none">
            <div class="progress-header">
                <span class="progress-title"><i class="fas fa-tasks"></i> 测评进度</span>
                <span class="progress-percentage" id="progressPercentage">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <div class="progress-steps" id="progressSteps"></div>
        </div>
        <div class="welcome-screen" id="welcomeScreen">
            <span class="welcome-badge">🎯 发现你的职业DNA</span>
            <h2>探索最适合你的生物医药职业</h2>
            <p class="subtitle">本测评基于Holland职业兴趣理论和生物医药行业特点，通过36道情景题目，从6个维度评估你的职业倾向。</p>
            <div class="feature-grid">
                <div class="feature-card"><div class="feature-icon">🔬</div><h3>科学严谨</h3><p>基于RIASEC职业兴趣理论设计</p></div>
                <div class="feature-card"><div class="feature-icon">📊</div><h3>6维评估</h3><p>全面评估职业倾向</p></div>
                <div class="feature-card"><div class="feature-icon">🎭</div><h3>情景模拟</h3><p>真实工作场景测试</p></div>
            </div>
            <div class="stats-bar">
                <div class="stat-item"><span class="stat-number">36</span><span class="stat-label">测评题目</span></div>
                <div class="stat-item"><span class="stat-number">6</span><span class="stat-label">评估维度</span></div>
                <div class="stat-item"><span class="stat-number">38</span><span class="stat-label">匹配职业</span></div>
                <div class="stat-item"><span class="stat-number">8-10</span><span class="stat-label">分钟完成</span></div>
            </div>
            <button class="btn btn-primary btn-large" onclick="startAssessment()"><i class="fas fa-play"></i> 开始测评</button>
            <div class="save-status" id="saveStatus"><i class="fas fa-info-circle"></i><span>测评进度将自动保存</span></div>
        </div>
        <div id="questionContainer"></div>
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-animation"><div class="loading-ring"></div><div class="loading-ring"></div><div class="loading-ring"></div></div>
            <div class="loading-text">正在分析你的职业倾向<span class="loading-dots"></span></div>
            <div class="loading-subtext">正在计算6维能力画像</div>
        </div>
        <div class="results-screen" id="resultsScreen">
            <div class="result-hero">
                <div class="result-badge" id="resultType">-</div>
                <h2 class="result-title" id="resultTitle"></h2>
                <p class="result-description" id="resultDescription"></p>
            </div>
            <div class="dimensions-section">
                <div class="section-header"><div class="section-icon"><i class="fas fa-chart-bar"></i></div><h3 class="section-title">六维能力画像</h3></div>
                <div class="dimension-cards" id="dimensionCards"></div>

let currentQuestion=0,answers=[],scores={research:0,practical:0,business:0,social:0,technical:0,analytical:0};

function initProgressSteps(){const c=document.getElementById('progressSteps');c.innerHTML='';for(let i=0;i<questions.length;i++){const s=document.createElement('div');s.className='progress-step';s.id='step-'+i;c.appendChild(s)}}

function updateProgress(){const p=(currentQuestion/questions.length)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressPercentage').textContent=Math.round(p)+'%';for(let i=0;i<questions.length;i++){const s=document.getElementById('step-'+i);s.className=i<currentQuestion?'progress-step completed':i===currentQuestion?'progress-step active':'progress-step'}}

function showToast(msg,dur=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

function saveProgress(){localStorage.setItem('biocareer_assessment',JSON.stringify({currentQuestion,answers,timestamp:new Date().toISOString()}));const ss=document.getElementById('saveStatus');if(ss){ss.innerHTML='<i class="fas fa-check-circle"></i><span>进度已保存</span>';ss.classList.add('saved')}}

function loadProgress(){const s=localStorage.getItem('biocareer_assessment');if(s){const d=JSON.parse(s);if(d.answers&&d.answers.length>0){currentQuestion=d.currentQuestion||0;answers=d.answers||[];return true}}return false}

function clearProgress(){localStorage.removeItem('biocareer_assessment')}

function startAssessment(){if(loadProgress()&&currentQuestion>0){if(confirm('检测到您上次测评做到第'+(currentQuestion+1)+'题，是否继续？\n点击"确定"继续，点击"取消"重新开始。')){document.getElementById('welcomeScreen').style.display='none';document.getElementById('progressContainer').style.display='block';initProgressSteps();renderQuestion();return}else{clearProgress();currentQuestion=0;answers=[]}}document.getElementById('welcomeScreen').style.display='none';document.getElementById('progressContainer').style.display='block';initProgressSteps();renderQuestion()}

function renderQuestion(){const c=document.getElementById('questionContainer'),q=questions[currentQuestion],d=dimensions[q.dimension];c.innerHTML='<div class="question-card active"><div class="question-header"><span class="question-number">问题 '+(currentQuestion+1)+' / '+questions.length+'</span><span class="dimension-tag">'+d.icon+' '+d.name+'</span></div><h3 class="question-text">'+q.text+'</h3><div class="scenario-box"><p>'+q.scenario+'</p></div><div class="options-container">'+q.options.map((o,i)=>'<button class="option-btn '+(answers[currentQuestion]===i?'selected':'')+'" onclick="selectOption('+i+')"><span class="option-letter">'+String.fromCharCode(65+i)+'</span><span class="option-text">'+o.text+'</span></button>').join('')+'</div><div class="nav-buttons"><button class="btn btn-secondary" onclick="prevQuestion()" '+(currentQuestion===0?'disabled':'')+'><i class="fas fa-arrow-left"></i> 上一题</button><button class="btn btn-primary" onclick="nextQuestion()" '+(answers[currentQuestion]===undefined?'disabled':'')+'>'+(currentQuestion===questions.length-1?'查看结果 <i class="fas fa-chart-pie"></i>':'下一题 <i class="fas fa-arrow-right"></i>')+'</button></div></div>';updateProgress()}

function selectOption(i){answers[currentQuestion]=i;saveProgress();renderQuestion()}
function prevQuestion(){if(currentQuestion>0){currentQuestion--;renderQuestion()}}
function nextQuestion(){if(currentQuestion<questions.length-1){currentQuestion++;renderQuestion()}else{showResults()}}

function calculateScores(){scores={research:0,practical:0,business:0,social:0,technical:0,analytical:0};answers.forEach((ai,qi)=>{const o=questions[qi].options[ai];Object.keys(o.score).forEach(k=>{scores[k]+=o.score[k]})});const mx=18;Object.keys(scores).forEach(k=>{scores[k]=Math.round(scores[k]/mx*100)})}

function showResults(){document.getElementById('questionContainer').style.display='none';document.getElementById('progressContainer').style.display='none';document.getElementById('loadingScreen').classList.add('active');clearProgress();setTimeout(()=>{calculateScores();renderResults();document.getElementById('loadingScreen').classList.remove('active');document.getElementById('resultsScreen').classList.add('active');createConfetti();window.scrollTo({top:0,behavior:'smooth'})},2000)}

function createConfetti(){const colors=['#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6'];for(let i=0;i<50;i++){setTimeout(()=>{const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];c.style.animationDuration=(Math.random()*2+2)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4000)},i*50)}}

function renderResults(){const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]),top=sorted[0][0],sec=sorted[1][0],code=dimensions[top].code+dimensions[sec].code,name=dimensions[top].name+'-'+dimensions[sec].name;document.getElementById('resultType').textContent=code;document.getElementById('resultTitle').textContent=name;document.getElementById('resultDescription').textContent='你的职业DNA以"'+dimensions[top].name+'"为主导，辅以"'+dimensions[sec].name+'"特质。'+dimensions[top].description+'同时，你也具备'+dimensions[sec].description+'的特点。';document.getElementById('dimensionCards').innerHTML=sorted.map(([k,s],i)=>{const lv=s>=70?'high':s>=40?'medium':'low',cls=i===0?'primary':i===1?'secondary':'';return'<div class="dimension-card '+cls+'"><div class="dimension-header"><span class="dimension-name">'+dimensions[k].icon+' '+dimensions[k].name+'</span><span class="dimension-code">'+dimensions[k].code+'</span></div><div class="dimension-bar"><div class="dimension-fill '+lv+'" style="width:'+s+'%"></div></div><div class="dimension-score">'+s+'分</div><p class="dimension-desc">'+dimensions[k].description+'</p></div>'}).join('');const rc=[];[top,sec].forEach((dim,idx)=>{careerDatabase[dim].slice(0,2).forEach(c=>{rc.push({...c,match:idx===0?c.match:Math.round(c.match*0.9)})})});const uc=[];const seen=new Set();rc.forEach(c=>{if(!seen.has(c.name)){seen.add(c.name);uc.push(c)}});uc.sort((a,b)=>b.match-a.match);document.getElementById('careerCards').innerHTML=uc.slice(0,4).map((c,i)=>'<div class="career-card '+(i===0?'best-match':'')+'"><div class="career-header"><div class="career-rank">'+(i+1)+'</div><span class="career-match-badge '+(c.match>=90?'high':'medium')+'"><i class="fas fa-star"></i> 匹配度 '+c.match+'%</span></div><h4 class="career-name">'+c.name+'</h4><div class="career-tags">'+c.tags.map(t=>'<span class="career-tag">'+t+'</span>').join('')+'</div><p class="career-description">'+c.description+'</p><div class="career-details"><div class="career-detail"><span class="career-detail-value">'+c.salary+'</span><span class="career-detail-label">参考年薪</span></div><div class="career-detail"><span class="career-detail-value">'+c.growth+'</span><span class="career-detail-label">发展节奏</span></div><div class="career-detail"><span class="career-detail-value">'+c.tags[0]+'</span><span class="career-detail-label">入行门槛</span></div></div></div>').join('')}

function restartAssessment(){currentQuestion=0;answers=[];scores={research:0,practical:0,business:0,social:0,technical:0,analytical:0};document.getElementById('resultsScreen').classList.remove('active');document.getElementById('welcomeScreen').style.display='block';document.getElementById('progressContainer').style.display='none';document.getElementById('questionContainer').style.display='block';const ss=document.getElementById('saveStatus');if(ss){ss.innerHTML='<i class="fas fa-info-circle"></i><span>测评进度将自动保存</span>';ss.classList.remove('saved')}window.scrollTo({top:0,behavior:'smooth'})}

function saveResult(){const code=document.getElementById('resultType').textContent,name=document.getElementById('resultTitle').textContent,desc=document.getElementById('resultDescription').textContent;let r='生物医药职业决策测评报告\n================================\n\n测评结果: '+code+' - '+name+'\n\n'+desc+'\n\n六维能力得分:\n';Object.entries(scores).sort((a,b)=>b[1]-a[1]).forEach(([k,s])=>{r+='- '+dimensions[k].name+': '+s+'分\n'});const blob=new Blob([r],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='生物医药职业测评报告_'+code+'_'+new Date().toLocaleDateString()+'.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('报告已下载！')}

function shareResult(){const code=document.getElementById('resultType').textContent,name=document.getElementById('resultTitle').textContent,txt='我在生物医药职业决策测评中的结果是：'+code+' - '+name+'。快来测测你的职业DNA吧！';if(navigator.share){navigator.share({title:'生物医药职业决策测评',text:txt,url:location.href}).then(()=>showToast('分享成功！')).catch(()=>{})}else{navigator.clipboard.writeText(txt+' '+location.href).then(()=>showToast('结果已复制到剪贴板！')).catch(()=>showToast('复制失败'))}}

document.addEventListener('keydown',e=>{const qc=document.querySelector('.question-card.active');if(!qc)return;if(e.key==='ArrowLeft'&&currentQuestion>0)prevQuestion();else if(e.key==='ArrowRight'&&answers[currentQuestion]!==undefined)nextQuestion();else if(['1','2','3','4'].includes(e.key)){const i=parseInt(e.key)-1,opts=qc.querySelectorAll('.option-btn');if(opts[i])selectOption(i)}});

window.onload=function(){if(loadProgress()&&currentQuestion>0){const ss=document.getElementById('saveStatus');if(ss){ss.innerHTML='<i class="fas fa-save"></i><span>检测到第 '+(currentQuestion+1)+' 题的进度，点击开始继续</span>';ss.classList.add('saved')}}};
